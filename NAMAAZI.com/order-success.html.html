<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — NAMAAZI</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600&family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --black: #0a0a0a; --white: #ffffff; --clay: #c8a882; --sand: #f2ede4; --font-body: 'DM Sans', sans-serif; }
  body { font-family: var(--font-body); background: var(--white); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
  .success-card { max-width: 500px; padding: 40px; }
  .icon-circle { width: 80px; height: 80px; background: var(--sand); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 24px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 16px; }
  p { color: #666; line-height: 1.6; margin-bottom: 32px; }
  .order-id { font-weight: 600; color: var(--black); background: var(--sand); padding: 8px 16px; border-radius: 4px; display: inline-block; margin-bottom: 32px; }
  .back-btn { background: var(--black); color: var(--white); text-decoration: none; padding: 16px 32px; border-radius: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }
</style>
</head>
<body>

<div class="success-card">
  <div class="icon-circle">🌿</div>
  <h1>Thank You for Your Order</h1>
  <p>We've received your order and are getting it ready for dispatch. You will receive a confirmation email shortly with your tracking details.</p>
  <div class="order-id" id="orderIdDisplay">Order #NMZ-00000</div>
  <br>
  <a href="index.html" class="back-btn">Continue Shopping</a>
</div>

<script>
  // Generate a random order number for the user
  const randomId = Math.floor(10000 + Math.random() * 90000);
  document.getElementById('orderIdDisplay').textContent = `Order #NMZ-${randomId}`;

  // Clear the cart since the purchase is complete
  localStorage.removeItem('namaazi_cart');
</script>
</body>
</html>
